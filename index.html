<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Study</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .screen { display: none; width: 100%; max-width: 700px; }
        .screen.active { display: block; }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 2.5rem;
        }

        h1 { font-size: 1.75rem; font-weight: 700; color: #1e1b4b; margin-bottom: 0.4rem; }
        .subtitle { color: #6b7280; margin-bottom: 2rem; }

        /* Home screen */
        .home-header { text-align: center; margin-bottom: 2.5rem; }
        .home-header h1 { font-size: 2rem; }
        .home-header p { color: #6b7280; margin-top: 0.4rem; }

        .mode-btn {
            width: 100%;
            padding: 1.5rem 2rem;
            border-radius: 14px;
            border: 2px solid transparent;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: all 0.18s;
            margin-bottom: 1rem;
        }
        .mode-btn:last-child { margin-bottom: 0; }

        .mode-btn-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .mode-btn-icon svg { width: 24px; height: 24px; }

        .mode-btn-text strong { display: block; font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; }
        .mode-btn-text span { font-size: 0.85rem; }

        .mode-btn-random {
            background: #eef2ff;
            color: #3730a3;
        }
        .mode-btn-random .mode-btn-icon { background: #4f46e5; color: white; }
        .mode-btn-random:hover { background: #e0e7ff; border-color: #4f46e5; }

        .mode-btn-all {
            background: #f0fdf4;
            color: #14532d;
        }
        .mode-btn-all .mode-btn-icon { background: #16a34a; color: white; }
        .mode-btn-all:hover { background: #dcfce7; border-color: #16a34a; }

        .stats-row {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e7eb;
        }
        .stat {
            flex: 1;
            text-align: center;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 10px;
        }
        .stat-number { font-size: 1.5rem; font-weight: 800; color: #1e1b4b; }
        .stat-label { font-size: 0.75rem; color: #6b7280; margin-top: 0.2rem; }

        /* Buttons */
        .btn {
            padding: 0.7rem 1.4rem;
            border-radius: 10px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover:not(:disabled) { background: #4338ca; }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .btn-secondary:hover:not(:disabled) { background: #e5e7eb; }
        .btn-outline { background: transparent; color: #4f46e5; border: 2px solid #4f46e5; }
        .btn-outline:hover:not(:disabled) { background: #eef0ff; }
        .btn-sm { padding: 0.45rem 0.9rem; font-size: 0.85rem; }

        /* Progress */
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            color: #6b7280;
            font-weight: 600;
        }
        .progress-bar {
            height: 6px;
            background: #e5e7eb;
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            transition: width 0.35s ease;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1e1b4b;
            line-height: 1.65;
            margin-bottom: 1.75rem;
        }

        .options-list { display: flex; flex-direction: column; gap: 0.7rem; }

        .option-btn {
            width: 100%;
            padding: 0.95rem 1.2rem;
            background: #f8fafc;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.9rem;
            font-size: 0.95rem;
            color: #374151;
            transition: all 0.15s;
            line-height: 1.4;
        }
        .option-btn:hover:not(:disabled) { border-color: #4f46e5; background: #eef0ff; color: #4f46e5; }
        .option-btn:hover:not(:disabled) .letter { background: #4f46e5; color: white; }
        .option-btn:disabled { cursor: default; }

        .letter {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.78rem;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .option-btn.correct { border-color: #10b981; background: #ecfdf5; color: #065f46; }
        .option-btn.correct .letter { background: #10b981; color: white; }
        .option-btn.wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
        .option-btn.wrong .letter { background: #ef4444; color: white; }

        .feedback {
            display: none;
            margin-top: 1.25rem;
            padding: 0.9rem 1.1rem;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            align-items: flex-start;
            gap: 0.6rem;
            line-height: 1.5;
        }
        .feedback.correct { display: flex; background: #ecfdf5; color: #065f46; }
        .feedback.wrong { display: flex; background: #fef2f2; color: #991b1b; }

        .next-btn-wrap { display: none; margin-top: 1.5rem; text-align: right; }

        /* Results */
        .score-display { text-align: center; padding: 1.5rem 0 2rem; }
        .score-circle {
            width: 130px; height: 130px;
            border-radius: 50%;
            background: #4f46e5;
            color: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            transition: background 0.3s;
        }
        .score-pct { font-size: 2.2rem; font-weight: 800; line-height: 1; }
        .score-label { font-size: 0.72rem; opacity: 0.8; margin-top: 2px; letter-spacing: 0.04em; }
        .score-detail { color: #6b7280; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .result-verdict { font-size: 1.2rem; font-weight: 700; margin-bottom: 2rem; }
        .result-verdict.pass { color: #059669; }
        .result-verdict.fail { color: #dc2626; }
        .results-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }

        /* Review */
        .review-back { margin-bottom: 1.5rem; }
        .review-item {
            padding: 1.2rem; border-radius: 10px;
            margin-bottom: 0.9rem; border: 2px solid;
        }
        .review-item.correct { border-color: #10b981; background: #f0fdf4; }
        .review-item.wrong { border-color: #ef4444; background: #fff5f5; }
        .review-q { font-weight: 600; color: #1e1b4b; margin-bottom: 0.6rem; line-height: 1.5; font-size: 0.95rem; }
        .review-answer { font-size: 0.875rem; display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
        .correct-ans { color: #059669; font-weight: 600; }
        .wrong-ans { color: #dc2626; text-decoration: line-through; }
        .badge {
            display: inline-flex; align-items: center;
            padding: 0.2rem 0.65rem; border-radius: 99px;
            font-size: 0.72rem; font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 0.03em; text-transform: uppercase;
        }
        .badge-correct { background: #dcfce7; color: #166534; }
        .badge-wrong { background: #fee2e2; color: #991b1b; }
    </style>
</head>

<div id="screen-quiz" class="screen">

        </div>

        <div class="next-btn-wrap" id="nextBtnWrap">
            <button class="btn btn-primary" id="nextBtn">Next</button>
        </div>
    </div>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results" class="screen">
    <div class="card">
        <h1>Results</h1>
        <div class="score-display">
            <div class="score-circle" id="scoreCircle">

            <p class="result-verdict" id="resultVerdict"></p>
            <div class="results-actions">
                <button class="btn btn-primary" id="reviewBtn">Review Answers</button>
                <button class="btn btn-secondary" id="retryWrongBtn">Retry Wrong Only</button>
                <button class="btn btn-outline" id="homeBtn">Back to Home</button>
            </div>
        </div>
    </div>
</div>

<!-- REVIEW SCREEN -->
<div id="screen-review" class="screen">
    <div class="card">
        <button class="btn btn-secondary btn-sm review-back" id="backToResultsBtn">Back to Results</button>
        <h1>Review</h1>
        <p class="subtitle" id="reviewSubtitle"></p>
        <div id="reviewList"></div>
    </div>
</div>

    // --- Init home screen stats ---
    const total = ALL_QUESTIONS.length;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('statTotal').textContent = total;

    // --- State ---
    let questions = [];
    let userAnswers = [];
    let currentIndex = 0;
    let correctCount = 0;

    // --- Screen ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        window.scrollTo(0, 0);
    }

    // --- Home buttons ---
    document.getElementById('btn20').addEventListener('click', () => {
        const pool = [...ALL_QUESTIONS];
        shuffle(pool);
        startQuiz(pool.slice(0, 20));
    });

    document.getElementById('btnAll').addEventListener('click', () => {
        const pool = [...ALL_QUESTIONS];
        shuffle(pool);
        startQuiz(pool);
    });

    // --- Quiz ---
    function startQuiz(qs) {
        questions = qs.map(q => ({ ...q, options: [...q.options] }));
        userAnswers = new Array(questions.length).fill(-1);
        currentIndex = 0;
        correctCount = 0;
        showScreen('quiz');
        renderQuestion();
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function renderQuestion() {
        const q = questions[currentIndex];
        const total = questions.length;

        document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${total}`;
        document.getElementById('scoreCounter').textContent = `Score: ${correctCount} / ${currentIndex}`;
        document.getElementById('progressFill').style.width = `${(currentIndex / total) * 100}%`;
        document.getElementById('questionText').textContent = q.question;

        const list = document.getElementById('optionsList');
        list.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="letter">${LETTERS[i]}</span>${escHtml(opt)}`;
            btn.addEventListener('click', () => selectAnswer(i));
            list.appendChild(btn);
        });

        const fb = document.getElementById('feedback');
        fb.className = 'feedback';
        fb.textContent = '';
        document.getElementById('nextBtnWrap').style.display = 'none';
    }

    function selectAnswer(chosen) {
        const q = questions[currentIndex];
        userAnswers[currentIndex] = chosen;
        const isCorrect = chosen === q.answer;
        if (isCorrect) correctCount++;

        document.querySelectorAll('.option-btn').forEach((btn, i) => {
            btn.disabled = true;
            if (i === q.answer) btn.classList.add('correct');
            else if (i === chosen) btn.classList.add('wrong');
        });

        const fb = document.getElementById('feedback');
        if (isCorrect) {
            fb.className = 'feedback correct';
            fb.textContent = 'Correct!';
        } else {
            fb.className = 'feedback wrong';
            fb.textContent = `Wrong. The correct answer is ${LETTERS[q.answer]}: ${q.options[q.answer]}`;
        }

        const wrap = document.getElementById('nextBtnWrap');
        wrap.style.display = 'block';
        document.getElementById('nextBtn').textContent =
            currentIndex === questions.length - 1 ? 'See Results' : 'Next';
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
        if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); }
        else showResults();
    });

    // --- Results ---
    function showResults() {
        const total = questions.length;
        const pct = Math.round((correctCount / total) * 100);
        document.getElementById('scorePct').textContent = pct + '%';
        document.getElementById('scoreDetail').textContent = `${correctCount} correct out of ${total} questions`;

        const verdict = document.getElementById('resultVerdict');
        const circle = document.getElementById('scoreCircle');
        if (pct >= 60) {
            verdict.textContent = 'Passed!'; verdict.className = 'result-verdict pass';
            circle.style.background = '#059669';
        } else {
            verdict.textContent = 'Keep studying!'; verdict.className = 'result-verdict fail';
            circle.style.background = '#dc2626';
        }

        const wrongCount = userAnswers.filter((a, i) => a !== questions[i].answer).length;
        document.getElementById('retryWrongBtn').disabled = wrongCount === 0;
        showScreen('results');
    }

    document.getElementById('reviewBtn').addEventListener('click', () => { renderReview(); showScreen('review'); });
    document.getElementById('retryWrongBtn').addEventListener('click', () => {
        const wrong = questions.filter((q, i) => userAnswers[i] !== q.answer);
        startQuiz(wrong);
    });
    document.getElementById('homeBtn').addEventListener('click', () => showScreen('home'));
    document.getElementById('backToResultsBtn').addEventListener('click', () => showScreen('results'));

    // --- Review ---
    function renderReview() {
        const correct = userAnswers.filter((a, i) => a === questions[i].answer).length;
        document.getElementById('reviewSubtitle').textContent = `${correct} / ${questions.length} correct`;

        const list = document.getElementById('reviewList');
        list.innerHTML = '';
        questions.forEach((q, i) => {
            const chosen = userAnswers[i];
            const ok = chosen === q.answer;
            const div = document.createElement('div');
            div.className = 'review-item ' + (ok ? 'correct' : 'wrong');

            let ansHtml;
            if (ok) {
                ansHtml = `<span class="correct-ans">${LETTERS[q.answer]}: ${escHtml(q.options[q.answer])}</span>`;
            } else {
                const wrongPart = chosen >= 0
                    ? `<span class="wrong-ans">${LETTERS[chosen]}: ${escHtml(q.options[chosen])}</span>`
                    : `<span class="wrong-ans">(no answer)</span>`;
                ansHtml = `${wrongPart}<span style="color:#6b7280;margin:0 0.25rem">→</span><span class="correct-ans">${LETTERS[q.answer]}: ${escHtml(q.options[q.answer])}</span>`;
            }

            div.innerHTML = `
                <span class="badge ${ok ? 'badge-correct' : 'badge-wrong'}">${ok ? 'Correct' : 'Wrong'}</span>
                <p class="review-q">${i+1}. ${escHtml(q.question)}</p>
                <div class="review-answer">${ansHtml}</div>`;
            list.appendChild(div);
        });
    }

    function escHtml(t) {
        return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
